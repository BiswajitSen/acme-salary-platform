services:
  postgres:
    image: postgres:16-alpine
    container_name: acme-salary-postgres
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: acme_salary
    ports:
      - "5433:5432"
    volumes:
      - acme_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_salary"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  acme_postgres_data:
